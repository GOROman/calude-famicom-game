<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PNG → CGROM 変換ツール (狩人行動)</title>
<style>
  :root { --red:#8b1a1a; --cream:#f5e9d0; }
  * { box-sizing:border-box; }
  body { margin:0; background:#1a1a1a; color:var(--cream); font-family:'Hiragino Kaku Gothic ProN', ui-sans-serif, sans-serif; }
  header { background:var(--red); padding:10px 16px; }
  header h1 { font-size:18px; margin:0; }
  header .sub { font-size:12px; opacity:.85; }
  main { padding:16px; display:flex; flex-wrap:wrap; gap:16px; }
  .panel { background:#242424; border:2px solid #444; border-radius:8px; padding:12px; }
  #drop {
    width:340px; min-height:120px; border:3px dashed #666; border-radius:8px;
    display:flex; align-items:center; justify-content:center; text-align:center;
    color:#999; cursor:pointer; padding:12px;
  }
  #drop.over { border-color:#ffd700; color:#ffd700; }
  canvas { image-rendering:pixelated; background:#000; display:block; }
  #preview { border:2px solid #555; margin-top:8px; }
  .swatches { display:flex; gap:6px; margin:8px 0; }
  .sw { width:44px; height:44px; border:2px solid #666; border-radius:6px; cursor:pointer;
        display:flex; align-items:flex-end; justify-content:center; font-size:10px;
        font-family:ui-monospace,monospace; color:#fff; text-shadow:0 0 3px #000; }
  .sw.bg { border-color:#ffd700; }
  textarea { width:100%; height:220px; background:#111; color:#9fdf9f; border:1px solid #444;
             border-radius:6px; font-family:ui-monospace,Menlo,monospace; font-size:11px; padding:8px; }
  .btn { background:var(--red); border:none; color:var(--cream); padding:8px 14px; border-radius:6px;
         cursor:pointer; font-size:13px; font-weight:bold; box-shadow:0 2px 0 #5d0f0f; margin-right:8px; }
  .btn:active { transform:translateY(2px); box-shadow:none; }
  .note { font-size:12px; color:#aaa; margin-top:6px; }
  a { color:#7fc4ff; }
  h2 { font-size:14px; margin:0 0 8px; }
</style>
</head>
<body>
<header>
  <h1>PNG → CGROM 変換ツール</h1>
  <span class="sub">画像を NES の CHR データ (.byte / .chr) とパレットに変換 — <a href="../../editor/" style="color:#ffd0a0">ステージエディタ</a> / <a href="https://github.com/GOROman/calude-famicom-game" style="color:#ffd0a0">GitHub</a></span>
</header>
<main>
  <div class="panel">
    <h2>1. 画像を読み込む</h2>
    <div id="drop">ここに PNG をドロップ<br>またはクリックして選択<br><small>(自動で減色。マルチパレットなら最大13色を再現)</small></div>
    <input type="file" id="file" accept="image/*" hidden>
    <div class="note" id="info"></div>
    <label style="font-size:13px; display:block; margin-top:8px">
      <input type="checkbox" id="multi" checked> マルチパレット (4パレット×3色+共通背景を 16x16 ブロック単位で自動割当)
    </label>
    <h2 style="margin-top:12px">2. パレット (自動割当)</h2>
    <div class="swatches" id="swatches"></div>
    <div class="note">色0 はスプライトでは透明として扱われます</div>
    <h2 style="margin-top:12px">3. プレビュー (NES 実色)</h2>
    <canvas id="preview" width="128" height="128" style="width:256px"></canvas>
  </div>
  <div class="panel" style="flex:1; min-width:320px">
    <h2>出力</h2>
    <button class="btn" id="dl-chr">💾 .chr をダウンロード</button>
    <button class="btn" id="copy-asm">📋 .byte をコピー</button>
    <textarea id="out" spellcheck="false" placeholder="ここに ca65 用の .byte データが出ます"></textarea>
    <div class="note">
      タイルは左上から 8x8 で切り出し。パレットは NES 64色から最近傍でマッチ。<br>
      chr.s に貼るか、.chr を .incbin してください。
    </div>
  </div>
</main>
<script>
'use strict';
// NES マスターパレット (2C02, 64色)
const NES_PAL = [
 [84,84,84],[0,30,116],[8,16,144],[48,0,136],[68,0,100],[92,0,48],[84,4,0],[60,24,0],
 [32,42,0],[8,58,0],[0,64,0],[0,60,0],[0,50,60],[0,0,0],[0,0,0],[0,0,0],
 [152,150,152],[8,76,196],[48,50,236],[92,30,228],[136,20,176],[160,20,100],[152,34,32],[120,60,0],
 [84,90,0],[40,114,0],[8,124,0],[0,118,40],[0,102,120],[0,0,0],[0,0,0],[0,0,0],
 [236,238,236],[76,154,236],[120,124,236],[176,98,236],[228,84,236],[236,88,180],[236,106,100],[212,136,32],
 [160,170,0],[116,196,0],[76,208,32],[56,204,108],[56,180,204],[60,60,60],[0,0,0],[0,0,0],
 [236,238,236],[168,204,236],[188,188,236],[212,178,236],[236,174,236],[236,174,212],[236,180,176],[228,196,144],
 [204,210,120],[180,222,120],[168,226,144],[152,226,180],[160,214,228],[160,162,160],[0,0,0],[0,0,0]];
const drop = document.getElementById('drop'), fileIn = document.getElementById('file');
const info = document.getElementById('info'), out = document.getElementById('out');
const prev = document.getElementById('preview'), pctx = prev.getContext('2d');
const multiChk = document.getElementById('multi');
let img = null;

drop.addEventListener('click', () => fileIn.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over');
  if (e.dataTransfer.files[0]) load(e.dataTransfer.files[0]); });
fileIn.addEventListener('change', () => fileIn.files[0] && load(fileIn.files[0]));
multiChk.addEventListener('change', () => img && process());

function load(f) {
  const im = new Image();
  im.onload = () => { img = im; process(); };
  im.src = URL.createObjectURL(f);
}

function nearestNes(r, g, b) {
  let best = 0, bd = 1e9;
  for (let i = 0; i < 64; i++) {
    if ((i & 15) >= 14) continue;
    const [pr, pg, pb] = NES_PAL[i];
    const d = (r-pr)**2*2 + (g-pg)**2*4 + (b-pb)**2*3;
    if (d < bd) { bd = d; best = i; }
  }
  return best;
}
const dist2 = (a, b) => (a[0]-b[0])**2 + (a[1]-b[1])**2 + (a[2]-b[2])**2;

// メディアンカットで k 色に減色 (colors: [[r,g,b,count],...])
function medianCut(colors, k) {
  let boxes = [colors];
  while (boxes.length < k) {
    boxes.sort((a, b) => spread(b) - spread(a));
    const box = boxes.shift();
    if (box.length < 2) { boxes.push(box); break; }
    const axis = widestAxis(box);
    box.sort((a, b) => a[axis] - b[axis]);
    const mid = box.length >> 1;
    boxes.push(box.slice(0, mid), box.slice(mid));
  }
  return boxes.map(box => {
    let r = 0, g = 0, b = 0, n = 0;
    for (const c of box) { r += c[0]*c[3]; g += c[1]*c[3]; b += c[2]*c[3]; n += c[3]; }
    return [Math.round(r/n), Math.round(g/n), Math.round(b/n)];
  });
  function widestAxis(box) {
    let best = 0, bw = -1;
    for (let a = 0; a < 3; a++) {
      const vs = box.map(c => c[a]);
      const w = Math.max(...vs) - Math.min(...vs);
      if (w > bw) { bw = w; best = a; }
    }
    return best;
  }
  function spread(box) {
    let s = 0;
    for (let a = 0; a < 3; a++) {
      const vs = box.map(c => c[a]);
      s = Math.max(s, Math.max(...vs) - Math.min(...vs));
    }
    return s * box.length;
  }
}

function process() {
  const multi = multiChk.checked;
  const scale = Math.min(1, 128 / Math.max(img.width, img.height));
  const W = Math.max(16, Math.ceil(img.width * scale / 16) * 16);
  const H = Math.max(16, Math.ceil(img.height * scale / 16) * 16);
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const x = c.getContext('2d');
  x.imageSmoothingEnabled = false;
  x.drawImage(img, 0, 0, W, H);
  const d = x.getImageData(0, 0, W, H).data;

  // 色ヒストグラム (アルファ<128 は背景扱い)
  const freq = new Map();
  let alphaCount = 0;
  for (let i = 0; i < d.length; i += 4) {
    if (d[i+3] < 128) { alphaCount++; continue; }
    const key = ((d[i]>>3)<<10) | ((d[i+1]>>3)<<5) | (d[i+2]>>3);
    freq.set(key, (freq.get(key) || 0) + 1);
  }
  const hist = [...freq.entries()].map(([k, n]) =>
    [((k>>10)&31)<<3, ((k>>5)&31)<<3, (k&31)<<3, n]).sort((a,b) => b[3]-a[3]);

  // 背景色 = 透明 or 最頻色
  const bgRgb = alphaCount > 0 ? [13,13,13] : hist[0].slice(0,3);
  const bodyHist = alphaCount > 0 ? hist : hist.slice(1);

  // 使える色数: シングル=3, マルチ=最大12
  const kmax = multi ? 12 : 3;
  const quant = bodyHist.length > kmax ? medianCut(bodyHist, kmax) : bodyHist.map(h => h.slice(0,3));

  // ピクセル → 量子化色番号 (背景=-1)
  const qIndex = (r,g,b) => {
    let best = 0, bd = 1e9;
    for (let i = 0; i < quant.length; i++) { const dd = dist2([r,g,b], quant[i]); if (dd < bd) { bd = dd; best = i; } }
    return best;
  };
  const qpix = new Int8Array(W*H);
  for (let i = 0, p = 0; i < d.length; i += 4, p++) {
    if (d[i+3] < 128 && alphaCount > 0) { qpix[p] = -1; continue; }
    const px = [d[i], d[i+1], d[i+2]];
    if (alphaCount === 0 && dist2(px, bgRgb) < 64) { qpix[p] = -1; continue; }
    qpix[p] = qIndex(...px);
  }

  // 各16x16ブロックの上位3色
  const BW = W/16, BH = H/16;
  const blockCols = [];
  for (let by = 0; by < BH; by++) for (let bx = 0; bx < BW; bx++) {
    const cnt = new Map();
    for (let y = 0; y < 16; y++) for (let xx = 0; xx < 16; xx++) {
      const q = qpix[(by*16+y)*W + bx*16+xx];
      if (q >= 0) cnt.set(q, (cnt.get(q)||0)+1);
    }
    blockCols.push([...cnt.entries()].sort((a,b) => b[1]-a[1]).slice(0,3).map(e => e[0]));
  }

  // パレット割当: 色数の多いブロックから貪欲にパッキング (最大4本)
  const palettes = [];
  const blockPal = new Int8Array(BW*BH);
  const order = blockCols.map((cols, i) => [i, cols]).sort((a,b) => b[1].length - a[1].length);
  const maxPals = multi ? 4 : 1;
  for (const [bi, cols] of order) {
    let placed = -1;
    for (let p = 0; p < palettes.length; p++) {
      const uni = new Set([...palettes[p], ...cols]);
      if (uni.size <= 3) { palettes[p] = [...uni]; placed = p; break; }
    }
    if (placed < 0 && palettes.length < maxPals) { palettes.push([...cols]); placed = palettes.length-1; }
    if (placed < 0) {
      let best = 0, bd = 1e9;
      for (let p = 0; p < palettes.length; p++) {
        let err = 0;
        for (const q of cols) {
          let e = 1e9;
          for (const pq of palettes[p]) e = Math.min(e, dist2(quant[q], quant[pq]));
          err += e;
        }
        if (err < bd) { bd = err; best = p; }
      }
      placed = best;
    }
    blockPal[bi] = placed;
  }
  while (palettes.length < maxPals) palettes.push([]);

  // NES 色へ
  const bgNes = alphaCount > 0 ? 0x0D : nearestNes(...bgRgb);
  const nesPals = palettes.map(pal => {
    const a = pal.map(q => nearestNes(...quant[q]));
    while (a.length < 3) a.push(0x0D);
    return a;
  });

  // ピクセル → パレットローカル番号 (0-3)
  const pixels = new Uint8Array(W*H);
  for (let by = 0; by < BH; by++) for (let bx = 0; bx < BW; bx++) {
    const pal = palettes[blockPal[by*BW+bx]];
    for (let y = 0; y < 16; y++) for (let xx = 0; xx < 16; xx++) {
      const p = (by*16+y)*W + bx*16+xx, q = qpix[p];
      if (q < 0 || !pal.length) { pixels[p] = 0; continue; }
      let best = 0, bd = 1e9;
      for (let s = 0; s < pal.length; s++) { const dd = dist2(quant[q], quant[pal[s]]); if (dd < bd) { bd = dd; best = s+1; } }
      pixels[p] = best;
    }
  }

  // プレビュー (割当パレットの NES 実色)
  prev.width = W; prev.height = H;
  const idata = pctx.createImageData(W, H);
  for (let by = 0; by < BH; by++) for (let bx = 0; bx < BW; bx++) {
    const pi = blockPal[by*BW+bx];
    for (let y = 0; y < 16; y++) for (let xx = 0; xx < 16; xx++) {
      const p = (by*16+y)*W + bx*16+xx, v = pixels[p];
      const nes = v === 0 ? bgNes : nesPals[pi][v-1];
      const [r,g,b] = NES_PAL[nes];
      idata.data[p*4] = r; idata.data[p*4+1] = g; idata.data[p*4+2] = b; idata.data[p*4+3] = 255;
    }
  }
  pctx.putImageData(idata, 0, 0);

  // スウォッチ (パレットごとに1行)
  const swWrap = document.getElementById('swatches');
  swWrap.innerHTML = '';
  const hex = v => '$' + v.toString(16).padStart(2,'0').toUpperCase();
  nesPals.forEach((pal, pi) => {
    if (!multi && pi > 0) return;
    const row = document.createElement('div');
    row.className = 'swatches';
    row.style.margin = '2px 0';
    [bgNes, ...pal].forEach((nes, slot) => {
      const [r,g,b] = NES_PAL[nes];
      const el = document.createElement('div');
      el.className = 'sw' + (slot === 0 ? ' bg' : '');
      el.style.width = '34px'; el.style.height = '34px';
      el.style.background = `rgb(${r},${g},${b})`;
      el.textContent = hex(nes);
      row.appendChild(el);
    });
    swWrap.appendChild(row);
  });

  // CHR + テキスト出力
  const tiles = [];
  for (let ty = 0; ty < H/8; ty++) for (let tx = 0; tx < W/8; tx++) {
    const p0 = [], p1 = [];
    for (let y = 0; y < 8; y++) {
      let b0 = 0, b1 = 0;
      for (let xx = 0; xx < 8; xx++) {
        const v = pixels[(ty*8+y)*W + tx*8+xx];
        b0 = (b0<<1) | (v&1); b1 = (b1<<1) | (v>>1);
      }
      p0.push(b0); p1.push(b1);
    }
    tiles.push([...p0, ...p1]);
  }
  window._chr = new Uint8Array(tiles.flat());
  let txt = `; ${W}x${H} → ${tiles.length} タイル (png2chr ${multi?'マルチパレット':'シングル'})\n`;
  txt += `; パレット (共通背景 ${hex(bgNes)}):\n`;
  nesPals.slice(0, multi?4:1).forEach((pal, pi) => {
    txt += `;   pal${pi}: .byte ${hex(bgNes)},${pal.map(hex).join(',')}\n`;
  });
  if (multi) {
    txt += `; 16x16ブロックごとのパレット番号 (${BW}x${BH}, 属性テーブル用):\n`;
    for (let by = 0; by < BH; by++) {
      txt += ';   .byte ' + [...blockPal.slice(by*BW, by*BW+BW)].join(',') + '\n';
    }
  }
  tiles.forEach((t, i) => {
    txt += `; tile ${i}\n`;
    txt += '    .byte ' + t.slice(0,8).map(hex).join(',') + '\n';
    txt += '    .byte ' + t.slice(8).map(hex).join(',') + '\n';
  });
  out.value = txt;
  info.textContent = `${img.width}x${img.height} → ${W}x${H} (${tiles.length} タイル), 元の色数 ${hist.length + (alphaCount?1:0)} → ` +
    (multi ? `4パレット x 3色 + 共通背景` : `4色`);
}

document.getElementById('dl-chr').addEventListener('click', () => {
  if (!window._chr) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([window._chr], {type:'application/octet-stream'}));
  a.download = 'tiles.chr';
  a.click();
});
document.getElementById('copy-asm').addEventListener('click', async () => {
  await navigator.clipboard.writeText(out.value);
  info.textContent = '.byte データをコピーしました';
});
</script>
</body>
</html>
